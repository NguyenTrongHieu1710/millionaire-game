<!DOCTYPE html>
<html>
<head>
    <title>Check Logo Position</title>
    <style>
        body { margin: 0; padding: 20px; background: #000; color: #fff; }
        .container { position: relative; width: 1920px; height: 1080px; margin: 0 auto; }
        .bg { width: 100%; height: 100%; object-fit: cover; }
        .logo { position: absolute; width: 280px; opacity: 0.8; border: 2px solid red; }
        .info { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; }
        input { width: 80px; }
    </style>
</head>
<body>
    <div class="info">
        <div>Top: <input id="top" type="number" value="50" step="0.1">%</div>
        <div>Left: <input id="left" type="number" value="50" step="0.1">%</div>
        <div>Transform X: <input id="tx" type="number" value="-50" step="1">%</div>
        <div>Transform Y: <input id="ty" type="number" value="-50" step="1">%</div>
        <button onclick="updatePosition()">Update</button>
        <div id="output" style="margin-top: 10px; font-size: 12px;"></div>
    </div>
    
    <div class="container">
        <img class="bg" src="/end-background.png" alt="Background">
        <img class="logo" id="logo" src="/icons/Main Logo Cropped.png" alt="Logo">
    </div>

    <script>
        function updatePosition() {
            const logo = document.getElementById('logo');
            const top = document.getElementById('top').value;
            const left = document.getElementById('left').value;
            const tx = document.getElementById('tx').value;
            const ty = document.getElementById('ty').value;
            
            logo.style.top = top + '%';
            logo.style.left = left + '%';
            logo.style.transform = `translate(${tx}%, ${ty}%)`;
            
            document.getElementById('output').innerHTML = `
                top: ${top}%<br>
                left: ${left}%<br>
                transform: translate(${tx}%, ${ty}%)
            `;
        }
        
        updatePosition();
    </script>
</body>
</html>
